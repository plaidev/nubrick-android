[versions]
activityCompose = "1.8.2"
agp = "8.10.0"
androidCompileSdk = "36"
androidMinSdk = "26"
androidTargetSdk = "36"
appcompat = "1.6.1"
browser = "1.8.0"
coil = "2.5.0"
