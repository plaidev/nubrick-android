espressoCore = "3.5.1"
junit = "4.13.2"
jvmTarget = "1.8"
kotlin = "2.0.21"
kotlinxSerializationJson = "1.7.3"
lifecycle = "2.9.4"
mockitoCore = "5.14.2"
navigationCompose = "2.9.8"
nubrick = "0.14.0"
okhttp = "4.12.0"
